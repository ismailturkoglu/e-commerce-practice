<body class="bg-light">

    <header>

        <!-- top-bar -->
        <section id="top-bar" class="my-2">
            <div class="container">
                <div class="row align-items-center gy-2 text-md-center py-2">
                    <!-- brand -->
                    <div class="col-5 col-lg-2 order-lg-0">
                        <div class="brand">
                            <div class="d-flex align-items-center">
                                <a href="index.html">
                                    <img src="img/logo.png" alt="logo">
                                </a>
                                <a href="index.html" class="brand-text">Smile-Trade</a>
                            </div>
                        </div>

                    </div>
                    <!-- profile -->
                    <div class="col-7 col-lg-6 order-lg-2">
                        <div class="profile d-flex justify-content-end">
                            <button type="button" class="btn btn-light ps-0">
                                <i class="fa-solid fa-user"></i>
                                <span>Profile</span>
                            </button>
                            <button type="button" class="btn btn-light">
                                <i class="fa-solid fa-heart"></i>
                                <span>List</span>
                            </button>
                            <button type="button" class="btn btn-light">
                                <i class="fa-solid fa-basket-shopping"></i>
                                <span>Basket </span>
                            </button>
                        </div>
                    </div>
                    <!-- search -->
                    <div class="col-12 col-lg-4 order-lg-1">
                        <form>
                            <div class="input-group search border border-secondary border-1 rounded-2">
                                <input type="text" class="form-control" placeholder="Search">
                                <button type="button" class="btn btn-logo">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </section>

        <!-- navbar -->
        <nav class="navbar navbar-expand-sm bg-logo navbar-dark p-2">
            <div class="container">
                <button type="button" class="navbar-toggler" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a href="#" class="nav-link">Electronics</a></li>
                        <li class="nav-item"><a href="#" class="nav-link">Book</a></li>

                            </ul>
                        </li>
